<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <!-- ======================================================
         SvelteKit head (Vite manages CSS & JS)
         ====================================================== -->
    %sveltekit.head%

    <!-- ======================================================
         Minimal global constraints only
         (no app / vendor CSS here)
         ====================================================== -->
    <style>
      html,
      body,
      #svelte {
        min-height: 100%;
        margin: 0;
      }
    </style>
  </head>

  <body>
    <div id="svelte">%sveltekit.body%</div>
  </body>
</html>
