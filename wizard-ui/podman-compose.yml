version: "3.9"

services:
  wizard-ui:
    build:
      context: .
      dockerfile: Containerfile
    # image: ghcr.io/borntoshare/wizard-ui:latest

    environment:
      TZ: ${TZ:-Europe/Paris}
      APP_ENV: ${APP_ENV:-prod}

    volumes:
      - ./wizard:/opt/wizard/wizard:ro

    ports:
      - "${WIZARD_PORT:-8080}:8080"

    restart: "no"

    networks:
      - app_net
      - db_net

networks:
  app_net:
    name: ${APP_NET:-b2s_app_net}
    external: true

  db_net:
    name: ${DB_NET:-b2s_db_net}
    external: true
